version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: jornaltrade_db
    restart: always
    environment:
      POSTGRES_USER: jornaltrade
      POSTGRES_PASSWORD: secretpassword123
      POSTGRES_DB: jornaltrade
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jornaltrade_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    container_name: jornaltrade_api
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8088 --reload
    ports:
      - "8088:8088"
    volumes:
      - .:/code
    environment:
      - DATABASE_URL=postgresql://jornaltrade:secretpassword123@db:5432/jornaltrade
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretjwtkeythatisreallylongandsecure12345!
      - ENVIRONMENT=development
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
